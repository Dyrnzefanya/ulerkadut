<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A neon-styled classic Snake game.">
    <title>Neon Snake | Classic Game Remastered</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>NEON SNAKE</h1>
            <div class="score-board">
                <div class="score-box" id="current-score-box">
                    <span class="label">SCORE</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="score-box">
                    <span class="label">HIGH SCORE</span>
                    <span id="high-score" class="value">0</span>
                </div>
            </div>
        </header>

        <main>
            <div class="canvas-wrapper">
                <canvas id="gameCanvas" width="400" height="400"></canvas>
                <div id="game-overlay" class="overlay">
                    <div class="overlay-content">
                        <h2 id="overlay-title">Ready?</h2>
                        <p id="overlay-text">Press Space or Start to play</p>
                        <button id="start-btn">Start Game</button>
                    </div>
                </div>
            </div>
            
            <div class="controls-hint">
                <p>Use <strong>Arrow Keys</strong> or <strong>WASD</strong> to move</p>
                <div class="mobile-controls">
                    <button id="up-btn" class="control-btn" aria-label="Up">▲</button>
                    <div class="horizontal-controls">
                        <button id="left-btn" class="control-btn" aria-label="Left">◀</button>
                        <button id="down-btn" class="control-btn" aria-label="Down">▼</button>
                        <button id="right-btn" class="control-btn" aria-label="Right">▶</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
